<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contractable</title>
  <style>
    @font-face {
      font-family: 'Swell Braille';
      src: url('Swell-Braille.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: "Apple Braille", "Courier New", monospace;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 22ch;
      max-width: 100%;
    }

    h1 {
      font-family: 'Swell Braille', sans-serif;
      font-size: 28px;
      margin-bottom: 0.5em;
      letter-spacing: 0;
    }

    /* Each line is strictly kept as a single text container element.
      The visual high-contrast columns are drawn using a CSS linear gradient:
      8ch (#1a1a1a) + 1ch (#000) + 5ch (#262626) + 1ch (#000) + 5ch (#1f1f1f) + 2ch (#000) = 22ch
    */
    #header, .row {
      display: block;
      width: 22ch;
      height: 1.4em;
      line-height: 1.4em;
      margin-bottom: 4px;
      font-family: "Apple Braille", "Courier New", monospace;
      font-variant-numeric: tabular-nums;
      white-space: pre;
      letter-spacing: 0;
      box-sizing: border-box;
      outline: none;
      
      background: linear-gradient(to right,
        #1a1a1a 0ch,  #1a1a1a 8ch,
        #000000 8ch,  #000000 9ch,
        #262626 9ch,  #262626 14ch,
        #000000 14ch, #000000 15ch,
        #1f1f1f 15ch, #1f1f1f 20ch,
        #000000 20ch, #000000 22ch
      );
    }

    #game-board {
      margin-bottom: 1em;
    }

    /* Flexbox prevents form controls from wrapping onto separate lines on mobile screens */
    #controls { 
      margin-top: 1.5em; 
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 22ch;
      box-sizing: border-box;
    }

    #guess-input { 
      font-family: monospace; 
      flex-grow: 1;
      width: 0; 
      font-size: 16px; 
      background-color: #000000; 
      color: #ffffff; 
      border: 1px solid #ffffff; 
      padding: 6px;
      box-sizing: border-box;
    }

    #submit-btn {
      font-family: sans-serif; 
      background-color: #000000; 
      color: #ffffff;            
      border: 2px solid #FFC107; 
      padding: 4px 14px;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px; 
      margin-left: 6px;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    #status {
      margin-top: 1em;
      font-family: 'Swell Braille', sans-serif;
      font-size: 24px;
      min-height: 1.2em;
    }

    #debug-log { 
      margin-top: 2em; 
      font-size: 0.65em; 
      color: #ff6b6b; 
      border-top: 1px solid #333333; 
      padding-top: 10px;
      font-family: monospace;
      white-space: pre-wrap;
    }

    @media print {
      #controls, #debug-log {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <h1 aria-label="Contractable" aria-braillelabel="⠉⠕⠗⠗⠑⠉⠞⠁⠃⠇⠑">⠉⠕⠗⠗⠑⠉⠞⠁⠃⠇⠑</h1>
    
    <div id="game-board" aria-live="polite">
      <div id="header" aria-label="correct guess wrong" aria-braillelabel="⠉⠕⠗⠗⠑⠉⠞⠀⠛⠥⠑⠎⠎⠀⠺⠗⠰⠛" tabIndex="-1">⠉⠕⠗⠗⠑⠉⠞ ⠛⠥⠑⠎⠎ ⠺⠗⠰⠛  </div>
    </div>

    <div id="controls">
      <label for="guess-input" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;">Enter Guess</label>
      <input type="text" id="guess-input" maxlength="5" placeholder="⠠⠠⠠⠠⠠" autocomplete="off" autofocus>
      <button id="submit-btn">GO</button>
    </div>

    <div id="status" role="region" aria-live="assertive"></div>
    <div id="debug-log"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>

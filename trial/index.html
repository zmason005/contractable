<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contractable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Prevent arbitrary text zooming mechanics in iOS Safari */
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Global Page Canvas Layout */
    body { 
      font-family: "Apple Braille", "Courier New", monospace; 
      padding: 15px; 
      background-color: #000000; /* Pure black background */
      color: #ffffff;            /* Stark white global text */
    }

    /* Simple, Un-sectioned Layout Container */
    .app-container {
      max-width: 30ch;
      margin: 0 auto;
      box-sizing: border-box;
      font-size: 28px; /* Globally enlarged for visual clarity of Braille cells */
    }
    
    h1 {
      margin-top: 0.5em;
      margin-bottom: 0.5em;
      font-size: 1.2em;
    }
    
    #status { margin-top: 0.5em; white-space: pre; font-weight: bold; }
    
    /* Simplified Game Board: No background columns, gradients, or custom width rules */
    #game-board { 
      margin-top: 1em; 
      white-space: pre;
      box-sizing: border-box;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      padding: 8px 0;
    }
    
    .row { 
      outline: none; 
      margin-bottom: 2px; 
      letter-spacing: 0;
    }
    
    #controls { 
      margin-top: 1.5em; 
    }
    
    #guess-label { 
      display: block; 
      margin-bottom: 0.5em; 
      font-size: 0.9em;
    }
    
    /* Text Input Box */
    #guess-input { 
      font-family: monospace; 
      width: 10ch; 
      font-size: 16px; /* Blocks iOS mobile zoom on focus */
      background-color: #000000; 
      color: #ffffff; 
      border: 1px solid #ffffff; 
      padding: 6px;
      vertical-align: middle;
    }
    
    /* High-Contrast Amber Outlined Action Button */
    #submit-btn {
      font-family: sans-serif; 
      background-color: #000000; 
      color: #ffffff;            
      border: 2px solid #FFC107; 
      padding: 4px 14px;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px; 
      vertical-align: middle;
      margin-left: 6px;
      box-sizing: border-box;
    }

    #submit-btn:hover {
      background-color: rgba(255, 193, 7, 0.15);
    }

    #debug-log { 
      margin-top: 2em; 
      font-size: 0.6em; 
      color: red; 
      border-top: 1px solid #ccc; 
      padding-top: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div class="app-container">

    <h1 aria-label="Contractable" aria-braillelabel="⠠⠠⠒⠞⠗⠁⠉⠞⠁⠃⠇⠑⠀">
      <span aria-hidden="true">⠠⠠⠒⠞⠗⠁⠉⠞⠁⠃⠇⠑⠀</span>
    </h1>

    <div id="status" role="status" aria-label="Status Messages" tabindex="-1"></div>

    <div id="game-board" aria-live="polite">
      <div 
        id="header" 
        aria-label="Correct, Guess, Wrong" 
        aria-braillelabel="⠉⠕⠗⠗⠑⠉⠞⠀⠛⠥⠑⠎⠎⠀⠺⠗⠰⠛">
        <span aria-hidden="true">⠉⠕⠗⠗⠑⠉⠞⠀⠛⠥⠑⠎⠎⠀⠺⠗⠰⠛</span>
      </div>
    </div>

    <div id="controls">
      <label id="guess-label" for="guess-input" aria-label="Guess" aria-braillelabel="⠛⠥⠑⠎⠎">⠛⠥⠑⠎⠎</label>
      <input id="guess-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button id="submit-btn" aria-label="Submit" aria-braillelabel="⠎⠥⠃⠍⠊⠞">⠎⠥⠃⠍⠊⠞</button>
    </div>

    <div id="debug-log"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>

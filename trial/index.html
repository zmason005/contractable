<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contractable</title>
  <style>
    @font-face {
      font-family: 'Swell Braille';
      src: url('Swell-Braille.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: "Apple Braille", "Courier New", monospace;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 22ch;
      max-width: 100%;
    }

    h1 {
      font-family: 'Swell Braille', sans-serif;
      font-size: 28px;
      margin-bottom: 0.5em;
      letter-spacing: 0;
    }

    /* Unified Grid Coordinate Anchor */
    #header, .row { 
      position: relative;
      display: block;
      width: 22ch;
      height: 1.2em;
      margin-bottom: 2px;
      font-family: "Apple Braille", "Courier New", monospace;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      white-space: nowrap;
      outline: none;
    }

    /* Presentational Background Layer - Entirely Hidden from Screen Readers & Braille Displays */
    .row-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 22ch;
      height: 100%;
      z-index: 1;
      display: flex;
    }

    /* Columns mapped using strict character width metrics */
    .bg-c1     { background-color: #1a1a1a; width: 8ch; display: inline-block; box-sizing: border-box; }
    .bg-s1     { background-color: #000000; width: 1ch; display: inline-block; box-sizing: border-box; }
    .bg-c2     { background-color: #262626; width: 5ch; display: inline-block; box-sizing: border-box; }
    .bg-s2     { background-color: #000000; width: 1ch; display: inline-block; box-sizing: border-box; }
    .bg-c3     { background-color: #1f1f1f; width: 5ch; display: inline-block; box-sizing: border-box; }
    .bg-margin { background-color: #000000; width: 2ch; display: inline-block; box-sizing: border-box; }

    /* Pure Text Data Channel - Natural character tracking prevents truncation bugs */
    .row-text {
      position: relative;
      z-index: 2;
      pointer-events: none;
      font-family: "Apple Braille", "Courier New", monospace;
      white-space: pre;
    }

    #game-board {
      margin-bottom: 1em;
    }

    /* Flexbox Engine to eradicate controls line wrapping */
    #controls { 
      margin-top: 1.5em; 
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 22ch;
      box-sizing: border-box;
    }

    #guess-input { 
      font-family: monospace; 
      flex-grow: 1;
      width: 0; 
      font-size: 16px; 
      background-color: #000000; 
      color: #ffffff; 
      border: 1px solid #ffffff; 
      padding: 6px;
      box-sizing: border-box;
    }

    #submit-btn {
      font-family: sans-serif; 
      background-color: #000000; 
      color: #ffffff;            
      border: 2px solid #FFC107; 
      padding: 4px 14px;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px; 
      margin-left: 6px;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    #status {
      margin-top: 1em;
      font-family: 'Swell Braille', sans-serif;
      font-size: 24px;
      min-height: 1.2em;
    }

    #debug-log { 
      margin-top: 2em; 
      font-size: 0.65em; 
      color: #ff6b6b; 
      border-top: 1px solid #333333; 
      padding-top: 10px;
      font-family: monospace;
      white-space: pre-wrap;
    }

    @media print {
      #controls, #debug-log {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <h1 aria-label="Contractable" aria-braillelabel="в†Йв†Хв†Чв†Чв†Св†Йв†Юв†Бв†Гв†Зв†С">в†Йв†Хв†Чв†Чв†Св†Йв†Юв†Бв†Гв†Зв†С</h1>
    
    <div id="game-board" aria-live="polite">
      <div id="header" aria-label="correct guess wrong" aria-braillelabel="в†Йв†Хв†Чв†Чв†Св†Йв†Юв†Ав†Ыв†•в†Св†Ов†Ов†Ав†Їв†Чв†∞в†Ы">
        <div class="row-bg" aria-hidden="true">
          <span class="bg-c1"></span><span class="bg-s1"></span>
          <span class="bg-c2"></span><span class="bg-s2"></span>
          <span class="bg-c3"></span><span class="bg-margin"></span>
        </div>
        <div class="row-text">в†Йв†Хв†Чв†Чв†Св†Йв†Ю в†Ыв†•в†Св†Ов†О в†Їв†Чв†∞в†Ы  </div>
      </div>
    </div>

    <div id="controls">
      <label for="guess-input" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;">Enter Guess</label>
      <input type="text" id="guess-input" maxlength="5" placeholder="в††в††в††в††в††" autocomplete="off" autofocus>
      <button id="submit-btn">GO</button>
    </div>

    <div id="status" role="region" aria-live="assertive"></div>
    <div id="debug-log"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>

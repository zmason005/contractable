<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contractable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Prevent arbitrary text zooming mechanics in iOS Safari */
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Global Page Canvas Layout */
    body { 
      font-family: sans-serif; 
      padding: 15px; 
      background-color: #000000; /* Pure black background */
      color: #ffffff;            /* Stark white global text */
    }

    /* Centralized Structural Column: 
      Calculates layout width based on exactly 20 braille characters + 2 padding units.
    */
    .app-container {
      max-width: 22ch;
      margin: 0 auto;
      box-sizing: border-box;
      font-size: 28px; /* Globally enlarged for visual clarity of Braille cells */
    }
    
    h1 {
      margin-top: 0.5em;
      margin-bottom: 0.5em;
      font-size: 1.2em;
    }
    
    #status { margin-top: 0.5em; white-space: pre; font-weight: bold; }
    
    /* Hardened Visual Grid Layout (8ch / 1ch / 5ch / 1ch / 5ch / 2ch) */
    #game-board { 
      margin-top: 1em; 
      white-space: pre;
      width: 22ch;
      box-sizing: border-box;
      font-family: "Apple Braille", "Courier New", monospace;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      padding: 8px 0;
      
      /* Pure CSS gradient columns mapping directly to typographic ch units */
      background: linear-gradient(
        to right,
        #1a1a1a 0ch,  #1a1a1a 8ch,  /* c1: Correct (8ch wide) */
        #000000 8ch,  #000000 9ch,  /* s1: Gutter (1ch wide) */
        #262626 9ch,  #262626 14ch, /* c2: Guess (5ch wide) */
        #000000 14ch, #000000 15ch, /* s2: Gutter (1ch wide) */
        #1f1f1f 15ch, #1f1f1f 20ch, /* c3: Wrong (5ch wide) */
        #000000 20ch, #000000 22ch  /* Tail Margin (2ch wide) */
      );
    }
    
    /* Rows inherit monospaced font geometry to align with parent columns */
    .row { 
      outline: none; 
      margin-bottom: 2px; 
      font-family: "Apple Braille", "Courier New", monospace;
      letter-spacing: 0;
    }
    
    #controls { 
      margin-top: 1.5em; 
    }
    
    #guess-label { 
      display: block; 
      margin-bottom: 0.5em; 
      font-size: 0.9em;
    }
    
    /* Isolated Text Input for standard keyboard entry legibility */
    #guess-input { 
      font-family: monospace; 
      width: 10ch; 
      font-size: 16px; /* Blocks iOS mobile zoom on focus */
      background-color: #000000; 
      color: #ffffff; 
      border: 1px solid #ffffff; 
      padding: 6px;
      vertical-align: middle;
    }
    
    /* High-Contrast Amber Outlined Action Button */
    #submit-btn {
      font-family: sans-serif; 
      background-color: #000000; 
      color: #ffffff;            
      border: 2px solid #FFC107; 
      padding: 4px 14px;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px; 
      vertical-align: middle;
      margin-left: 6px;
      box-sizing: border-box;
    }

    #submit-btn:hover {
      background-color: rgba(255, 193, 7, 0.15);
    }

    #debug-log { 
      margin-top: 2em; 
      font-size: 0.6em; 
      color: red; 
      border-top: 1px solid #ccc; 
      padding-top: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div class="app-container">

    <h1 aria-label="Contractable" aria-braillelabel="в††в††в†Тв†Юв†Чв†Бв†Йв†Юв†Бв†Гв†Зв†Св†А">в††в††в†Тв†Юв†Чв†Бв†Йв†Юв†Бв†Гв†Зв†Св†А</h1>

    <div id="status" role="status" aria-label="Status Messages" tabindex="-1"></div>

    <div id="game-board" aria-live="polite">
      <div 
        id="header" 
        aria-label="correct guess wrong" 
        aria-braillelabel="в†Йв†Хв†Чв†Чв†Св†Йв†Юв†Ав†Ыв†•в†Св†Ов†Ов†Ав†Їв†Чв†∞в†Ы">в†Йв†Хв†Чв†Чв†Св†Юв†Ав†Ав†Ыв†•в†Св†Ов†Ов†Ав†Їв†Чв†∞в†Ыв†Ав†Ав†А</div>
    </div>

    <div id="controls">
      <label id="guess-label" for="guess-input" aria-label="Guess" aria-braillelabel="в†Ыв†•в†Св†Ов†О">в†Ыв†•в†Св†Ов†О</label>
      <input id="guess-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button id="submit-btn" aria-label="Submit" aria-braillelabel="в†Ов†•в†Гв†Нв†Кв†Ю">в†Ов†•в†Гв†Нв†Кв†Ю</button>
    </div>

    <div id="debug-log"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>

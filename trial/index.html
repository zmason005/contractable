<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contractable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Prevent arbitrary text zooming mechanics in iOS Safari */
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Global Page Canvas Layout */
    body { 
      font-family: sans-serif; 
      padding: 15px; 
      background-color: #000000; /* Pure black background */
      color: #ffffff;            /* Stark white global text */
    }

    /* Centralized Structural Column: 
      Calculates layout width based on exactly 20 braille characters + 2 padding units.
    */
    .app-container {
      max-width: 22ch;
      margin: 0 auto;
      box-sizing: border-box;
      font-size: 28px; /* Globally enlarged for visual clarity of Braille cells */
    }
    
    h1 {
      margin-top: 0.5em;
      margin-bottom: 0.5em;
      font-size: 1.2em;
    }
    
    #status { margin-top: 0.5em; white-space: pre; font-weight: bold; }
    
    /* Hardened Visual Grid Layout Wrapper */
    #game-board { 
      margin-top: 1em; 
      width: 22ch;
      box-sizing: border-box;
      font-family: "Apple Braille", "Courier New", monospace;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }
    
    /* Each row behaves as a unified horizontal layout strip */
    #header, .row { 
      display: flex;
      outline: none; 
      margin-bottom: 2px; 
      font-family: "Apple Braille", "Courier New", monospace;
      letter-spacing: 0;
      white-space: nowrap;
    }

    /* Hardened Typographic Visual Columns (8ch / 1ch / 5ch / 1ch / 5ch / 2ch) */
    .c1-block { background-color: #1a1a1a; width: 8ch; display: inline-block; box-sizing: border-box; }
    .s1-block { background-color: #000000; width: 1ch; display: inline-block; box-sizing: border-box; }
    .c2-block { background-color: #262626; width: 5ch; display: inline-block; box-sizing: border-box; }
    .s2-block { background-color: #000000; width: 1ch; display: inline-block; box-sizing: border-box; }
    .c3-block { background-color: #1f1f1f; width: 5ch; display: inline-block; box-sizing: border-box; }
    .margin-block { background-color: #000000; width: 2ch; display: inline-block; box-sizing: border-box; }
    
    #controls { 
      margin-top: 1.5em; 
    }
    
    #guess-label { 
      display: block; 
      margin-bottom: 0.5em; 
      font-size: 0.9em;
    }
    
    /* Isolated Text Input for standard keyboard entry legibility */
    #guess-input { 
      font-family: monospace; 
      width: 10ch; 
      font-size: 16px; /* Blocks iOS mobile zoom on focus */
      background-color: #000000; 
      color: #ffffff; 
      border: 1px solid #ffffff; 
      padding: 6px;
      vertical-align: middle;
    }
    
    /* High-Contrast Amber Outlined Action Button */
    #submit-btn {
      font-family: sans-serif; 
      background-color: #000000; 
      color: #ffffff;            
      border: 2px solid #FFC107; 
      padding: 4px 14px;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px; 
      vertical-align: middle;
      margin-left: 6px;
      box-sizing: border-box;
    }

    #submit-btn:hover {
      background-color: rgba(255, 193, 7, 0.15);
    }

    #debug-log { 
      margin-top: 2em; 
      font-size: 0.6em; 
      color: red; 
      border-top: 1px solid #ccc; 
      padding-top: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div class="app-container">

    <h1 aria-label="Contractable" aria-braillelabel="⠠⠠⠒⠞⠗⠁⠉⠞⠁⠃⠇⠑⠀">⠠⠠⠒⠞⠗⠁⠉⠞⠁⠃⠇⠑⠀</h1>

    <div id="status" role="status" aria-label="Status Messages" tabindex="-1"></div>

    <div id="game-board" aria-live="polite">
      <div id="header" aria-label="correct guess wrong" aria-braillelabel="⠉⠕⠗⠗⠑⠉⠞⠀⠛⠥⠑⠎⠎⠀⠺⠗⠰⠛">
        <span class="c1-block">⠉⠕⠗⠗⠑⠉⠞⠀</span><span class="s1-block">⠀</span><span class="c2-block">⠛⠥⠑⠎⠎</span><span class="s2-block">⠀</span><span class="c3-block">⠺⠗⠰⠛⠀</span><span class="margin-block">⠀⠀</span>
      </div>
    </div>

    <div id="controls">
      <label id="guess-label" for="guess-input" aria-label="Guess" aria-braillelabel="⠛⠥⠑⠎⠎">⠛⠥⠑⠎⠎</label>
      <input id="guess-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button id="submit-btn" aria-label="Submit" aria-braillelabel="⠎⠥⠃⠍⠊⠞">⠎⠥⠃⠍⠊⠞</button>
    </div>

    <div id="debug-log"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>

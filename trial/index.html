<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contractable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Prevent arbitrary text zooming mechanics in iOS Safari */
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      /* Dynamic fluid baseline: scales smoothly with viewports */
      font-size: calc(0.9rem + 0.3vw); 
      box-sizing: border-box;
    }

    *, *:before, *:after {
      box-sizing: inherit;
    }

    /* Global Page Canvas Layout */
    body { 
      font-family: "Apple Braille", "Courier New", monospace; 
      padding: 1.5vh 3vw; /* Fluid paddings bounded by viewport heights/widths */
      background-color: #000000; /* Pure black background */
      color: #ffffff;            /* Stark white global text */
      margin: 0;
      width: 100%;
    }

    /* THE MASTER APP CONTAINER
       ======================================================================
       Added 'text-align: center' here. This forces all inline children blocks 
       (like headings, row text, and status blocks) to automatically align down 
       the absolute central axis of the container across different viewports.
    */
    .app-container {
      width: 100%;
      max-width: 32ch; /* Safe maximum width bound mapped to character limits */
      margin: 0 auto; /* Centers the block container horizontally on large screens */
      font-size: clamp(1.3rem, 5vw, 1.75rem); /* Preserves large dots on small screens, limits upper range */
      text-align: center; /* ALIGNMENT FIX: Centers headers, status text, and buttons down the central axis */
    }
    
    h1 {
      margin-top: 0.5em;
      margin-bottom: 0.5em;
      font-size: 1.2em;
    }

    /* Ensure hidden items are completely invisible to sighted and assistive tech alike */
    [hidden] {
      display: none !important;
    }
    
    #status { 
      margin-top: 0.5em; 
      white-space: pre; 
      font-weight: bold; 
      outline: none; /* Removes the default browser focus ring when focused via JS */
    }
    
    /* THE GAME BOARD CONTAINER
       ======================================================================
       CRITICAL GAP FIX: Replaced 'white-space: pre-line' with modern vertical 
       flexbox configuration. This eliminates hidden code-formatting indentation 
       gaps entirely while keeping rows correctly isolated as straight lines.
    */
    #game-board { 
      margin-top: 1em; 
      display: flex;
      flex-direction: column;
      gap: 0.15em;
      font-variant-numeric: tabular-nums; /* Keeps all numeric characters exactly uniform in width */
      letter-spacing: 0; /* Lock letter spacing to preserve physical Braille tracking alignments */
      padding: 0.1em 0; /* Tighter padding values to bring rows and header closer together */
      width: 100%;
      text-align: center; /* ALIGNMENT FIX: Forces dynamic rows injected inside to center standardly */
    }
    
    .row { 
      outline: none; 
      margin-bottom: 0.15em; 
      letter-spacing: 0;
      white-space: nowrap;
    }
    
    #controls { 
      margin-top: 1.5em; 
      width: 100%;
    }
    
    #guess-label { 
      display: block; 
      margin-bottom: 0.5em; 
      font-size: 0.9em;
    }
    
    /* Text Input Box */
    #guess-input { 
      font-family: monospace; 
      width: 10ch; 
      /* Bypasses iOS auto-zoom constraints smoothly using rem sizing */
      font-size: 1rem; 
      background-color: #000000; 
      color: #ffffff; 
      border: 0.08rem solid #ffffff; 
      padding: 0.4em;
      vertical-align: middle;
    }
    
    /* High-Contrast Amber Outlined Action Button */
    #submit-btn {
      font-family: sans-serif; 
      background-color: #000000; 
      color: #ffffff;            
      border: 0.125rem solid #FFC107; 
      padding: 0.3em 1em;
      font-weight: bold;
      cursor: pointer;
      font-size: 1.1rem; 
      vertical-align: middle;
      margin-left: 0.4rem;
    }

    #submit-btn:hover {
      background-color: rgba(255, 193, 7, 0.15);
    }

    #debug-log { 
      margin-top: 2em; 
      font-size: 0.6em; 
      color: #ff4d4d; /* High-contrast crimson optimized for pitch black surfaces */
      border-top: 0.08rem solid #ccc; 
      padding-top: 0.65rem;
      font-family: monospace;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="app-container">

    <h1 aria-label="CONTRACTABLE" aria-braillelabel="⠠⠠⠒⠞⠗⠁⠉⠞⠁⠃⠇⠑">
      <span aria-hidden="true">⠠⠠⠒⠞⠗⠁⠉⠞⠁⠃⠇⠑⠀</span>
    </h1>

    <div id="game-board" aria-live="polite">
      <div 
        id="header" 
        role="text"
        aria-label="correct, guess, wrong"
        aria-braillelabel="⠉⠕⠗⠗⠑⠉⠞⠀⠛⠥⠑⠎⠎⠀⠺⠗⠰⠛"><span aria-hidden="true">⠉⠕⠗⠗⠑⠉⠞⠀⠛⠥⠑⠎⠎⠀⠺⠗⠰⠛</span></div>
    </div>

    <div id="status" tabindex="-1" hidden></div>

    <div id="controls">
      <label id="guess-label" for="guess-input" aria-hidden="true">⠛⠥⠑⠎⠎</label>
      <input 
        id="guess-input" 
        type="text" 
        aria-label="guess"
        aria-braillelabel="⠛⠥⠑⠎⠎"
        autocomplete="off" 
        autocapitalize="off" 
        spellcheck="false" />
      <button id="submit-btn" aria-label="submit" aria-braillelabel="⠎⠥⠃⠍⠊⠞">⠎⠥⠃⠍⠊⠞</button>
    </div>

    <div id="debug-log"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>

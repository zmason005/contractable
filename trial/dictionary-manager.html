<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ValidWordBuilder</title>
<style>
body {
background-color: #000000;
color: #ffffff;
font-family: system-ui, -apple-system, sans-serif;
margin: 10px;
padding: 0;
line-height: 1.4;
}
h1, h2, h3 {
text-align: left;
margin: 15px 0 5px 0;
}
blockquote {
margin: 0 0 10px 0;
padding: 0;
text-align: left;
display: block;
}
.container {
max-width: 100%;
width: 50ch;
}
input, button, textarea {
background-color: #000000;
color: #ffffff;
border: 1px solid #ffffff;
padding: 5px;
margin: 5px 0;
font-family: inherit;
}
#status-message {
font-weight: bold;
margin-top: 5px;
}
#json-output {
width: 100%;
max-width: 100%;
box-sizing: border-box;
color: #55ff55;
font-family: monospace;
margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">
<h1>Word Manager</h1>
<blockquote>Use this tool to manage and compile game dictionary files.</blockquote>

<h2>System Setup</h2>
<blockquote>
<label for="master-loader">1. Load Master daily-word2.json</label><br>
<input type="file" id="master-loader" accept=".json"><br>
<label for="supp-loader">2. Load Current extra-words.json (Optional)</label><br>
<input type="file" id="supp-loader" accept=".json"><br>
<div id="status-message">Awaiting JSON database files...</div>
</blockquote>

<h2>Add New Word</h2>
<blockquote>
<label for="print-str">Print String</label><br>
<input type="text" id="print-str" name="print-str" autocomplete="off"><br>
<label for="braille-str">Braille Key Inputs (Case Sensitive, e.g., a!B)</label><br>
<input type="text" id="braille-str" name="braille-str" autocomplete="off"><br>
<div id="translation-preview" style="color:#aaa; font-size:0.9em; margin-bottom:5px;">Preview translation: </div>
<button type="button" id="add-btn" onclick="processNewEntry()">Add Entry</button>
</blockquote>

<h2>Data Export</h2>
<blockquote>
<button type="button" id="copy-btn" onclick="copyJsonToClipboard()">Copy JSON</button>
<button type="button" id="export-btn" onclick="exportSupplementalFile()">Download Backup</button><br>
<label for="json-output" style="display:block; margin-top:10px;">Current Supplemental JSON:</label>
<textarea id="json-output" readonly rows="12" placeholder="JSON data will generate here..."></textarea>
</blockquote>
</div>

<script>
let masterWords = [];
let supplementalWords = [];
const status = document.getElementById('status-message');
const jsonOutput = document.getElementById('json-output');
const preview = document.getElementById('translation-preview');

// Raw metadata array baked directly into the utility
const rawBrailleData = [
  { "unicodeChar": "⠀", "printAscii": " " },
  { "unicodeChar": "⠮", "printAscii": "!" },
  { "unicodeChar": "⠐", "printAscii": "\"" },

  { "unicodeChar": "⠫", "printAscii": "$" },
  { "unicodeChar": "⠩", "printAscii": "%" },
  { "unicodeChar": "⠯", "printAscii": "&" },
  { "unicodeChar": "⠄", "printAscii": "'" },
  { "unicodeChar": "⠷", "printAscii": "(" },
  { "unicodeChar": "⠾", "printAscii": ")" },
  { "unicodeChar": "⠡", "printAscii": "*" },
  { "unicodeChar": "⠬", "printAscii": "+" },
  { "unicodeChar": "⠠", "printAscii": "," },
  { "unicodeChar": "⠤", "printAscii": "-" },
  { "unicodeChar": "⠨", "printAscii": "." },
  { "unicodeChar": "⠌", "printAscii": "/" },
  { "unicodeChar": "⠴", "printAscii": "0" },
  { "unicodeChar": "⠂", "printAscii": "1" },
  { "unicodeChar": "⠆", "printAscii": "2" },
  { "unicodeChar": "⠒", "printAscii": "3" },
  { "unicodeChar": "⠲", "printAscii": "4" },
  { "unicodeChar": "⠢", "printAscii": "5" },
  { "unicodeChar": "⠖", "printAscii": "6" },
  { "unicodeChar": "⠶", "printAscii": "7" },
  { "unicodeChar": "⠦", "printAscii": "8" },
  { "unicodeChar": "⠔", "printAscii": "9" },
  { "unicodeChar": "⠱", "printAscii": ":" },
  { "unicodeChar": "⠰", "printAscii": ";" },
  { "unicodeChar": "⠣", "printAscii": "<" },
  { "unicodeChar": "⠿", "printAscii": "=" },
  { "unicodeChar": "⠜", "printAscii": ">" },
  { "unicodeChar": "⠹", "printAscii": "?" },
  { "unicodeChar": "⡈", "printAscii": "@" },
  { "unicodeChar": "⡁", "printAscii": "A" },
  { "unicodeChar": "⡃", "printAscii": "B" },
  { "unicodeChar": "⡉", "printAscii": "C" },
  { "unicodeChar": "⡙", "printAscii": "D" },
  { "unicodeChar": "⡑", "printAscii": "E" },
  { "unicodeChar": "⡋", "printAscii": "F" },

  { "unicodeChar": "⡅", "printAscii": "K" },
  { "unicodeChar": "⡇", "printAscii": "L" },
  { "unicodeChar": "⡍", "printAscii": "M" },
  { "unicodeChar": "⡝", "printAscii": "N" },
  { "unicodeChar": "⡕", "printAscii": "O" },

  { "unicodeChar": "⡺", "printAscii": "W" },
  { "unicodeChar": "⡭", "printAscii": "X" },
  { "unicodeChar": "⡽", "printAscii": "Y" },
  { "unicodeChar": "⡵", "printAscii": "Z" },
  { "unicodeChar": "⡪", "printAscii": "[" },
  { "unicodeChar": "⡳", "printAscii": "\\" },
  { "unicodeChar": "⡻", "printAscii": "]" },
  { "unicodeChar": "⡘", "printAscii": "^" },
  { "unicodeChar": "⠸", "printAscii": "_" },
  { "unicodeChar": "⠈", "printAscii": "`" },
  { "unicodeChar": "⠁", "printAscii": "a" },
  { "unicodeChar": "⠃", "printAscii": "b" },
  { "unicodeChar": "⠉", "printAscii": "c" },
  { "unicodeChar": "⠙", "printAscii": "d" },
  { "unicodeChar": "⠑", "printAscii": "e" },
  { "unicodeChar": "⠋", "printAscii": "f" },
  { "unicodeChar": "⠛", "printAscii": "g" },
  { "unicodeChar": "⠓", "printAscii": "h" },

  { "unicodeChar": "⠚", "printAscii": "j" },
  { "unicodeChar": "⠅", "printAscii": "k" },
  { "unicodeChar": "⠇", "printAscii": "l" },
  { "unicodeChar": "⠍", "printAscii": "m" },
  { "unicodeChar": "⠝", "printAscii": "n" },
  { "unicodeChar": "⠕", "printAscii": "o" },
  { "unicodeChar": "⠏", "printAscii": "p" },
  { "unicodeChar": "⠟", "printAscii": "q" },
  { "unicodeChar": "⠗", "printAscii": "r" },
  { "unicodeChar": "⠎", "printAscii": "s" },
  { "unicodeChar": "⠞", "printAscii": "t" },
  { "unicodeChar": "⠥", "printAscii": "u" },
  { "unicodeChar": "⠧", "printAscii": "v" },
  { "unicodeChar": "⠺", "printAscii": "w" },
  { "unicodeChar": "⠭", "printAscii": "x" },
  { "unicodeChar": "⠽", "printAscii": "y" },
  { "unicodeChar": "⠵", "printAscii": "z" },
  { "unicodeChar": "⠪", "printAscii": "{" },
  { "unicodeChar": "⠳", "printAscii": "|" },
  { "unicodeChar": "⠻", "printAscii": "}" },
  { "unicodeChar": "⠘", "printAscii": "~" }
];

// Automatically index the hardcoded list into an optimized lookup map on load
const brailleLookupMap = rawBrailleData.reduce((acc, entry) => {
    if (entry.printAscii !== undefined && entry.unicodeChar !== undefined) {
        acc[entry.printAscii] = entry.unicodeChar;
    }
    return acc;
}, {});

// Synchronize state changes to text viewer viewport
function updateJsonView() {
    if (supplementalWords.length > 0) {
        jsonOutput.value = JSON.stringify(supplementalWords, null, 2);
    } else {
        jsonOutput.value = '';
    }
}

// Convert input strings using the optimized lookup key-pairs
function translateStringToBraille(inputStr) {
    return inputStr.split('').map(char => {
        return brailleLookupMap[char] || char;
    }).join('');
}

// Live presentation tracking logic
document.getElementById('braille-str').addEventListener('input', (e) => {
    const converted = translateStringToBraille(e.target.value);
    preview.textContent = `Preview translation: ${converted}`;
});

// Phase 1: Manual Ingestion of the Master List
document.getElementById('master-loader').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            const parsed = JSON.parse(event.target.result);
            masterWords = Array.isArray(parsed) ? parsed : [];
            status.style.color = '#ffffff';
            status.textContent = `Loaded ${masterWords.length} base words from master file. Ready to build.`;
        } catch (err) {
            status.style.color = '#ff5555';
            status.textContent = 'Error parsing master JSON file.';
        }
    };
    reader.readAsText(file);
});

// Phase 2: Manual Ingestion of the existing Supplemental List
document.getElementById('supp-loader').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            const parsed = JSON.parse(event.target.result);
            supplementalWords = Array.isArray(parsed) ? parsed : [];
            status.style.color = '#ffffff';
            status.textContent = `Imported ${supplementalWords.length} entries from existing extra-words.json file.`;
            updateJsonView();
        } catch (err) {
            status.style.color = '#ff5555';
            status.textContent = 'Error parsing uploaded extra-words.json file.';
        }
    };
    reader.readAsText(file);
});

// Phase 3: Validation, Deduplication, and Safe Auto-ID Generation
function processNewEntry() {
    const printInput = document.getElementById('print-str').value.trim().toLowerCase();
    const rawBrailleInput = document.getElementById('braille-str').value.trim(); // Trimmed to handle white-space safety
    
    if (!printInput || !rawBrailleInput) {
        status.style.color = '#ff5555';
        status.textContent = 'Error: Both text fields require valid inputs.';
        return;
    }
    
    if (masterWords.length === 0) {
        status.style.color = '#ff5555';
        status.textContent = 'Error: Please load daily-word2.json before adding entries.';
        return;
    }
    
    // Parse character maps directly into unicode values
    const brailleInput = translateStringToBraille(rawBrailleInput);
    
    // Cross-file uniqueness check matching sanitized variables
    const matchInMaster = masterWords.some(w => (w.print?.toLowerCase().trim() === printInput) || (w.brlunicode?.trim() === brailleInput));
    const matchInSupp = supplementalWords.some(w => (w.print?.toLowerCase().trim() === printInput) || (w.brlunicode?.trim() === brailleInput));
    
    if (matchInMaster || matchInSupp) {
        status.style.color = '#ff5555';
        status.textContent = `Rejected: "${printInput}" or sequence matches an existing database pattern.`;
        return;
    }
    
    // Stack-safe Auto-Increment Logic using reduce()
    const combinedLists = [...masterWords, ...supplementalWords];
    const nextId = combinedLists.reduce((max, w) => {
        const currentId = parseInt(w.id, 10) || 0;
        return currentId > max ? currentId : max;
    }, 0) + 1;
        
    const entry = { id: nextId, print: printInput, brlunicode: brailleInput };
    supplementalWords.push(entry);
    
    status.style.color = '#55ff55';
    status.textContent = `Success: Saved "${printInput}" -> "${brailleInput}" as ID ${nextId}.`;
    
    // Update live text viewport layout 
    updateJsonView();
    
    // Reset inputs
    document.getElementById('print-str').value = '';
    document.getElementById('braille-str').value = '';
    preview.textContent = "Preview translation: ";
    document.getElementById('print-str').focus();
}

// Phase 4a: Copy System JSON text straight to clipboard for GitHub pasting
function copyJsonToClipboard() {
    if (supplementalWords.length === 0) {
        status.style.color = '#ff5555';
        status.textContent = 'No data available in the supplemental array to copy.';
        return;
    }
    
    navigator.clipboard.writeText(jsonOutput.value).then(() => {
        status.style.color = '#55ff55';
        status.textContent = 'JSON copied to clipboard! Ready to paste into GitHub.';
    }).catch(err => {
        status.style.color = '#ff5555';
        status.textContent = 'Failed to copy text automatically.';
    });
}

// Phase 4b: Fallback System Download File Tool
function exportSupplementalFile() {
    if (supplementalWords.length === 0) {
        status.style.color = '#ff5555';
        status.textContent = 'No new records in the supplemental array to export.';
        return;
    }
    
    const jsonStr = jsonOutput.value;
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = 'extra-words.json';
    document.body.appendChild(a);
    a.click();
    
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    status.style.color = '#55ff55';
    status.textContent = 'Backup completed! extra-words.json downloaded.';
}

// CHANGED: Listened to 'keydown' instead of 'keyup' to stop event echo when input focus swaps
document.getElementById('braille-str').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        processNewEntry();
    }
});
document.getElementById('print-str').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        processNewEntry();
    }
});
</script>
</body>
</html>

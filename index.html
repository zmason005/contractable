<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contractable</title>
  <style>
    /* Base CSS Layout and Color Profiles */
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: "Apple Braille", "Courier New", monospace;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 22ch;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    h1 {
      font-size: 28px;
      text-align: center;
      margin: 0 0 20px 0;
      word-break: break-all;
    }

    #status {
      min-height: 1.5em;
      margin-bottom: 15px;
      text-align: center;
      font-size: 20px;
      word-break: break-all;
    }

    #game-board {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 25px;
      font-size: 24px;
    }

    .row {
      white-space: pre;
      word-break: break-all;
    }

    #header {
      font-size: 24px;
      margin-bottom: 12px;
      white-space: pre;
      word-break: break-all;
      border-bottom: 1px solid #ffffff;
      padding-bottom: 4px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-family: monospace;
      font-size: 16px;
    }

    input[type="text"] {
      background-color: #000000;
      color: #ffffff;
      border: 1px solid #ffffff;
      padding: 8px;
      font-family: monospace;
      font-size: 16px;
      border-radius: 0;
    }

    button {
      background-color: #000000;
      color: #ffffff;
      border: 1px solid #ffffff;
      padding: 10px;
      font-family: monospace;
      font-size: 18px;
      cursor: pointer;
    }

    #debug-log {
      margin-top: 20px;
      color: #ff4d4d;
      font-family: monospace;
      font-size: 14px;
      white-space: pre-wrap;
    }

    /* Print View Accessibility Optimizations */
    @media print {
      .controls, #debug-log {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h1 
      aria-label="CONTRACTABLE" 
      aria-braillelabel="⠠⠠⠒⠞⠗⠁⠉⠞⠁⠃⠇⠑⠀">⠠⠠⠒⠞⠗⠁⠉⠞⠁⠃⠇⠑⠀</h1>

    <div 
      id="status" 
      role="status" 
      aria-live="assertive" 
      aria-label="status messages" 
      aria-braillelabel=""></div>

    <div 
      id="header" 
      aria-label="correct guess wrong" 
      aria-braillelabel="⠉⠕⠗⠗⠑⠉⠞⠀⠛⠥⠑⠎⠎⠀⠺⠗⠰⠛">⠉⠕⠗⠗⠑⠉⠞⠀⠛⠥⠑⠎⠎⠀⠺⠗⠰⠛</div>

    <div id="game-board" role="log"></div>

    <div class="controls">
      <div class="input-group">
        <label 
          id="guess-label" 
          for="guess-input" 
          aria-label="guess" 
          aria-braillelabel="⠛⠥⠑⠎⠎">⠛⠥⠑⠎⠎</label>
        <input 
          type="text" 
          id="guess-input"        autocapitalize="off" 
          autocomplete="off" 
          autocorrect="off" 
          spellcheck="false">
      </div>
      
      <button 
        id="submit-btn" 
        aria-label="submit" 
        aria-braillelabel="⠎⠥⠃⠍⠊⠞">⠎⠥⠃⠍⠊⠞</button>
    </div>

    <div id="debug-log"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>

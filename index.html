<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contractable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Global Page Canvas Layout */
    body { 
      font-family: monospace; 
      padding: 10px; 
      background-color: #000000; /* Pure black background */
      color: #ffffff;            /* Stark white global text */
    }

    /* 
      Centralized Structural Column: 
      Calculates layout width based on exactly 20 braille characters + 2 padding units.
      Centers the entire app horizontally on any desktop, tablet, or phone view.
    */
    .app-container {
      max-width: 22ch;
      margin: 0 auto;
      box-sizing: border-box;
    }
    
    h1 {
      margin-top: 0.5em;
      margin-bottom: 0.5em;
    }
    
    #status { margin-top: 0.5em; white-space: pre; font-weight: bold; }
    
    #game-board { margin-top: 1em; white-space: pre; }
    
    .row { outline: none; margin-bottom: 2px; }
    
    #controls { margin-top: 1.5em; }
    
    #guess-label { display: block; margin-bottom: 0.5em; }
    
    /* Integrated Dark Theme Text Input */
    #guess-input { 
      width: 10ch; 
      font-size: 16px; /* Prevents iOS mobile zoom on focus */
      background-color: #000000; 
      color: #ffffff; 
      border: 1px solid #ffffff; /* Sharp white border */
      padding: 4px;
      vertical-align: middle;
    }
    
    /* New Style: High-Contrast Amber Outlined Action Button */
    #submit-btn {
      background-color: #000000; /* Pure black interior fill */
      color: #ffffff;            /* Crisp white text inside */
      border: 2px solid #FFC107; /* High-visibility Amber outline border */
      padding: 4px 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      vertical-align: middle;
      margin-left: 4px;
      box-sizing: border-box;
    }

    #submit-btn:hover {
      background-color: rgba(255, 193, 7, 0.15); /* Subtle amber background tint on hover */
    }

    /* Left completely untouched per instruction */
    #debug-log { 
      margin-top: 2em; 
      font-size: 0.8em; 
      color: red; 
      border-top: 1px solid #ccc; 
      padding-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Layout wrapper constraint columns to 22 characters max width -->
  <div class="app-container">

    <h1>⠠⠠⠒⠞⠗⠁⠉⠞⠁⠃⠇⠑⠀</h1>

    <div id="status" role="status" tabindex="-1"></div>

    <div id="game-board" aria-live="polite">
      <div id="header">⠉⠕⠗⠗⠑⠉⠞⠀⠛⠥⠑⠎⠎⠀⠺⠗⠰⠛</div>
    </div>

    <div id="controls">
      <label id="guess-label" for="guess-input">⠛⠥⠑⠎⠎</label>
      <input
        id="guess-input"
        type="text"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <button id="submit-btn">⠎⠥⠃⠍⠊⠞</button>
    </div>

    <div id="debug-log"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>

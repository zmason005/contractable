<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Braille Wordle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: monospace;
    }

    #game-board {
      margin-top: 1em;
      white-space: pre;
    }

    .row {
      outline: none;
    }

    #guess-input {
      width: 6ch;
    }

    #debug {
      margin-top: 1em;
      border-top: 1px solid #999;
      padding-top: 0.5em;
    }
  </style>
</head>

<body>
  <h1>Braille Wordle</h1>

  <div id="game-board" aria-live="polite">
    <div id="header">correct guess wr;g</div>
  </div>

  <div id="controls">
    <input
      id="guess-input"
      type="text"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <button id="submit-btn">submit</button>
  </div>

  <!-- removable diagnostics -->
  <div id="debug"></div>

  <script src="main.js"></script>
</body>
</html>

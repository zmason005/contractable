<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Braille Wordle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: monospace;
    }

    #status {
      margin-top: 0.5em;
      white-space: pre;
    }

    #game-board {
      margin-top: 1em;
      white-space: pre;
    }

    .row {
      outline: none;
    }

    #controls {
      margin-top: 1em;
    }

    #guess-label {
      display: block;
      margin-bottom: 0.25em;
    }

    #guess-input {
      width: 6ch;
    }
  </style>
</head>

<body>
  <h1>Braille Wordle</h1>

  <!-- Win / Lose status -->
  <div
    id="status"
    role="status"
    tabindex="-1"
  ></div>

  <div id="game-board" aria-live="polite">
    <div id="header">correct guess wr;g</div>
  </div>

  <div id="controls">
    <label id="guess-label" for="guess-input">
      guess txt
    </label>

    <input
      id="guess-input"
      type="text"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <button id="submit-btn">submit</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
